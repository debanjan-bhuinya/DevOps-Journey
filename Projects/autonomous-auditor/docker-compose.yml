version: '3.8'

services:
  backend:
    build: ./backend
    container_name: auditor-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # NEW: The Docker Volume! This maps the container's data to your local machine.
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    container_name: auditor-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
