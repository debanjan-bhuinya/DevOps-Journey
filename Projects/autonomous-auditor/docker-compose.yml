services:
  nginx:
    image: nginx:alpine
    container_name: auditor-proxy
    ports:
      - "80:80"
      - "443:443"
    # THE CHEAT CODE: Directly linking your live files!
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

  backend:
    build: ./backend
    container_name: auditor-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    container_name: auditor-frontend
    depends_on:
      - backend
