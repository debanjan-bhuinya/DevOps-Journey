services:
  nginx:
    image: nginx:alpine
    container_name: auditor-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

  backend:
    build: ./backend
    container_name: auditor-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    container_name: auditor-frontend
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    container_name: auditor-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: auditor-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"

  # 📊 THE COMMAND CENTER: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: auditor-grafana
    ports:
      - "3001:3000" # Mapped to 3001 so it doesn't fight Next.js!
    depends_on:
      - prometheus
