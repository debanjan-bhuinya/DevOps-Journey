name: DevSecOps CI Pipeline

# Trigger this robot every time you push code to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Source Code
      uses: actions/checkout@v4

    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🏗️ Build Docker Image
      # We tag the image with the unique GitHub commit hash so every version is tracked!
      run: docker build -t pikachu003/auditor-backend:${{ github.sha }} ./Projects/autonomous-auditor/backend

    - name: 🛡️ Run Trivy Security Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'pikachu003/auditor-backend:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # This tells the pipeline to crash and burn if it finds a vulnerability!
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: 🚀 Push to Docker Hub
      if: success() # Only push if Trivy gives the green light!
      run: docker push pikachu003/auditor-backend:${{ github.sha }}
